<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css"></head><body>
<div class="slide slide-dark">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div class="slide-header"><div class="slide-num">08</div><div class="slide-logo">DM Compass</div></div>
    <h2 class="section-title">② <span class="accent">インスリン</span>持続静注</h2>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">調製</div>
      <div style="font-size:20px;font-weight:700">ヒューマリンR 50単位 + 生食 49.5 mL = <span class="accent">1 U/mL</span></div>
    </div>
    <div class="grid-2" style="margin-bottom:10px">
      <div class="card">
        <div class="card-title">投与速度</div>
        <div style="font-size:28px;font-weight:900;color:#fbbf24;margin:4px 0">0.1 U/kg/h</div>
        <div style="font-size:16px;color:#94a3b8">シリンジポンプで持続静注</div>
      </div>
      <div class="card">
        <div class="card-title">速度調整</div>
        <div style="font-size:16px;line-height:1.8">
          <span style="color:#f87171;font-weight:700">BS下降 ≥50/h</span> → 半量に減量<br>
          <span style="color:#5eead4;font-weight:700">BS下降 <50/h</span> → 同量で継続<br>
          <span style="color:#94a3b8">最低: 0.05 U/kg/h（2-3 mL/h）</span>
        </div>
      </div>
    </div>
    <div class="point-box">
      <div class="point-box-title">⚠️ 低血糖時（BS < 70）の対応</div>
      <div style="font-size:17px;line-height:1.7">
        50%ブドウ糖 20mL IV → 30分後再検 → BS >100まで繰り返す<br>
        <span style="font-weight:900;color:#fbbf24">※ インスリン流量は変更しない</span>（ケトアシドーシス離脱のため継続）
      </div>
    </div>
    <div class="slide-footer"><span>© Dr. いわたつ</span><span>DM Compass シリーズ vol.1</span></div>
  </div>
</div>
</body></html>
