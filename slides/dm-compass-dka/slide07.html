<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css">
<style>
  .pillar { text-align:center; padding:20px 16px; }
  .pillar-icon { font-size:36px; margin-bottom:12px; }
  .pillar-num { font-size:14px; color:#94a3b8; margin-bottom:4px; }
  .pillar-name { font-size:24px; font-weight:900; color:#2dd4bf; margin-bottom:8px; }
  .pillar-detail { font-size:15px; color:#cbd5e1; line-height:1.6; }
</style></head><body>
<div class="slide slide-dark">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div class="slide-header"><div class="slide-num">06</div><div class="slide-logo">DM Compass</div></div>
    <h2 class="section-title">治療の<span class="accent">4本柱</span></h2>
    <div class="grid-4">
      <div class="card pillar">
        <div class="pillar-icon">💧</div>
        <div class="pillar-num">PILLAR 1</div>
        <div class="pillar-name">輸液</div>
        <div class="pillar-detail">生食 500-1000 mL/h<br>脱水補正が最優先</div>
      </div>
      <div class="card pillar">
        <div class="pillar-icon">💉</div>
        <div class="pillar-num">PILLAR 2</div>
        <div class="pillar-name">インスリン</div>
        <div class="pillar-detail">0.1 U/kg/h<br>持続静注</div>
      </div>
      <div class="card pillar">
        <div class="pillar-icon">⚡</div>
        <div class="pillar-num">PILLAR 3</div>
        <div class="pillar-name">K補正</div>
        <div class="pillar-detail">低K時は<br>インスリン前に補正</div>
      </div>
      <div class="card pillar">
        <div class="pillar-icon">🧪</div>
        <div class="pillar-num">PILLAR 4</div>
        <div class="pillar-name">HCO₃⁻</div>
        <div class="pillar-detail">pH ≤ 6.9 の時のみ<br>通常は不要</div>
      </div>
    </div>
    <div style="margin-top:14px;text-align:center">
      <div style="font-size:20px;font-weight:700;color:#fbbf24">① → ② → ③ → ④ の順に対応。次スライドから各論。</div>
    </div>
    <div class="slide-footer"><span>© Dr. いわたつ</span><span>DM Compass シリーズ vol.1</span></div>
  </div>
</div>
</body></html>
