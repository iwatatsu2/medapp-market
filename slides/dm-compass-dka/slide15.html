<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css">
<style>
  .cta { text-align:center; }
  .cta-title { font-size:32px; font-weight:900; color:white; margin-bottom:10px; }
  .cta-app { display:inline-block; background:linear-gradient(135deg,#14b8a6,#0d9488); color:white; font-size:24px; font-weight:900; padding:12px 36px; border-radius:14px; margin:10px 0; }
  .cta-url { font-size:18px; color:#5eead4; margin-top:6px; }
  .links-area { display:flex; justify-content:center; gap:20px; margin-top:14px; }
  .link-card { background:rgba(20,184,166,0.08); border:1px solid rgba(20,184,166,0.3); border-radius:12px; padding:10px 20px; text-align:center; min-width:180px; }
  .link-icon { font-size:28px; margin-bottom:4px; }
  .link-label { font-size:13px; color:#94a3b8; margin-bottom:2px; }
  .link-url { font-size:14px; color:#2dd4bf; font-weight:700; }
  .cta-features { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px; text-align:center; }
  .cta-feat { background:rgba(20,184,166,0.1); border:1px solid rgba(20,184,166,0.2); border-radius:10px; padding:8px; }
  .cta-feat-name { font-size:14px; font-weight:700; color:#2dd4bf; }
  .cta-feat-desc { font-size:12px; color:#94a3b8; margin-top:2px; }
</style></head><body>
<div class="slide slide-dark cta">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div style="margin-top:20px">
      <div style="font-size:16px;color:#94a3b8;margin-bottom:6px">この内容をいつでもポケットに</div>
      <div class="cta-title">病棟で困ったら <span class="accent">DM Compass</span> を開こう</div>
      <div class="cta-app">📱 DM Compass</div>
      <div class="cta-url">🔗 無料・登録不要・スマホ対応</div>
      <div class="links-area">
        <div class="link-card">
          <div class="link-icon">🌐</div>
          <div class="link-label">公式サイト</div>
          <div class="link-url">driwatatsu.readdy.co</div>
        </div>
        <div class="link-card">
          <div class="link-icon">📱</div>
          <div class="link-label">Instagram</div>
          <div class="link-url">@dr.iwatatsu</div>
        </div>
        <div class="link-card">
          <div class="link-icon">🏥</div>
          <div class="link-label">医療アプリ</div>
          <div class="link-url">medapp-market.vercel.app</div>
        </div>
      </div>
      <div class="cta-features">
        <div class="cta-feat"><div class="cta-feat-name">高血糖緊急症</div><div class="cta-feat-desc">DKA/HHS判定＋治療</div></div>
        <div class="cta-feat"><div class="cta-feat-name">スライディングスケール</div><div class="cta-feat-desc">自動生成ツール</div></div>
        <div class="cta-feat"><div class="cta-feat-name">インスリンガイド</div><div class="cta-feat-desc">製剤一覧＋換算表</div></div>
        <div class="cta-feat"><div class="cta-feat-name">周術期管理</div><div class="cta-feat-desc">術前・術中・術後</div></div>
        <div class="cta-feat"><div class="cta-feat-name">カロリー計算</div><div class="cta-feat-desc">必要エネルギー算出</div></div>
        <div class="cta-feat"><div class="cta-feat-name">全14セクション</div><div class="cta-feat-desc">糖尿病病棟管理を網羅</div></div>
      </div>
      <div style="margin-top:10px;font-size:15px;color:#64748b">制作: <span style="color:#14b8a6;font-weight:900">Dr. いわたつ</span>（糖尿病・内分泌専門医）</div>
    </div>
  </div>
</div>
</body></html>
