<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css">
<style>
  .slide { padding: 0; }
  .profile-layout { display:flex; height:720px; }
  .profile-left { width:360px; background:linear-gradient(135deg,rgba(20,184,166,0.1),rgba(13,148,136,0.18)); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; }
  .profile-left img { width:180px; height:180px; border-radius:50%; border:4px solid #14b8a6; object-fit:cover; margin-bottom:20px; }
  .profile-name { font-size:28px; font-weight:900; color:white; margin-bottom:4px; }
  .profile-role { font-size:15px; color:#5eead4; font-weight:700; text-align:center; line-height:1.6; }
  .profile-right { flex:1; padding:50px 50px 40px; display:flex; flex-direction:column; justify-content:center; }
  .section-label { font-size:13px; font-weight:700; color:#14b8a6; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
  .intro-text { font-size:20px; color:#e2e8f0; line-height:1.8; margin-bottom:28px; font-weight:500; }
  .cred-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
  .cred-item { display:flex; align-items:center; gap:10px; background:rgba(20,184,166,0.08); border:1px solid rgba(20,184,166,0.2); border-radius:8px; padding:10px 14px; }
  .cred-icon { font-size:20px; flex-shrink:0; }
  .cred-text { font-size:14px; color:#cbd5e1; font-weight:600; }
  .award-section { margin-top:4px; }
  .award-title { font-size:14px; font-weight:900; color:#fbbf24; margin-bottom:8px; }
  .award-list { display:flex; flex-wrap:wrap; gap:6px; }
  .award-tag { background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.3); color:#fcd34d; font-size:12px; font-weight:600; padding:5px 12px; border-radius:6px; }
  .sns-area { margin-top:20px; display:flex; gap:16px; }
  .sns-link { color:#94a3b8; font-size:14px; font-weight:600; }
  .sns-link span { color:#2dd4bf; }
</style></head><body>
<div class="slide slide-dark">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="profile-layout" style="position:relative;z-index:3">
    <div class="profile-left">
      <img src="../../dr-iwatatsu.png" alt="Dr. いわたつ">
      <div class="profile-name">Dr. いわたつ</div>
      <div class="profile-role">糖尿病専門医・指導医<br>内分泌専門医<br>医学博士</div>
    </div>
    <div class="profile-right">
      <div class="section-label">About the Author</div>
      <div class="intro-text">
        研修医が病棟で迷わない実践ツール<br>
        「<span style="color:#2dd4bf;font-weight:900">DM Compass</span>」を開発・無料公開中。<br>
        高血糖緊急症・インスリン計算・<br>
        スライディングスケール等を即参照可能。
      </div>
      <div class="cred-grid">
        <div class="cred-item"><div class="cred-icon">🎓</div><div class="cred-text">和歌山県立医科大学卒</div></div>
        <div class="cred-item"><div class="cred-icon">📋</div><div class="cred-text">内科認定医</div></div>
        <div class="cred-item"><div class="cred-icon">🩺</div><div class="cred-text">糖尿病専門医・指導医</div></div>
        <div class="cred-item"><div class="cred-icon">🧬</div><div class="cred-text">内分泌専門医</div></div>
      </div>
      <div class="award-section">
        <div class="award-title">🏆 受賞歴</div>
        <div class="award-list">
          <span class="award-tag">看護師が選ぶベストレジデント賞</span>
          <span class="award-tag">研修医が選ぶベストチューター賞</span>
          <span class="award-tag">オルガネラ・ゾーン若手の会 優秀発表賞</span>
          <span class="award-tag">Medical Tribune 掲載</span>
        </div>
      </div>
      <div class="sns-area">
        <div class="sns-link">📷 <span>@dr.iwatatsu</span></div>
        <div class="sns-link">🌐 <span>driwatatsu.readdy.co</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
