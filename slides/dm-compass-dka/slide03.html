<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css"></head><body>
<div class="slide slide-dark">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div class="slide-header"><div class="slide-num">02</div><div class="slide-logo">DM Compass</div></div>
    <h2 class="section-title">DKA 診断の<span class="accent">3条件</span></h2>
    <div class="grid-3" style="margin-bottom:14px">
      <div class="card" style="text-align:center">
        <div style="font-size:36px;margin-bottom:8px">🔴</div>
        <div class="card-title">① 高血糖</div>
        <div style="font-size:28px;font-weight:900;color:#fbbf24;margin:8px 0">≥ 250 mg/dL</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:36px;margin-bottom:8px">🟡</div>
        <div class="card-title">② 代謝性アシドーシス</div>
        <div style="font-size:22px;font-weight:700;color:#fbbf24;margin:8px 0">pH < 7.30<br><span style="font-size:16px;color:#94a3b8">AND/OR</span><br>HCO₃⁻ < 15</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:36px;margin-bottom:8px">🟢</div>
        <div class="card-title">③ ケトン体陽性</div>
        <div style="font-size:22px;font-weight:700;color:#fbbf24;margin:8px 0">β-HB<br>> 3.0 mmol/L</div>
      </div>
    </div>
    <div class="point-box">
      <div class="point-box-title">⚠️ 尿ケトンの落とし穴</div>
      尿ケトンは半定量・遅延反映・偽陰性あり → <span style="font-weight:900">血中β-HBで判断</span>すること
    </div>
    <div class="slide-footer"><span>© Dr. いわたつ</span><span>DM Compass シリーズ vol.1</span></div>
  </div>
</div>
</body></html>
