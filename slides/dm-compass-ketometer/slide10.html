<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css"></head><body>
<div class="slide slide-dark">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div class="slide-header"><div class="slide-num">9</div><div class="slide-logo">DM Compass</div></div>
    <h2 class="section-title">DKA離脱の<span class="accent">判定基準</span>とβ-HB</h2>
    <div style="text-align:center;margin-bottom:12px;font-size:17px;color:#94a3b8">以下の<span style="color:#fbbf24;font-weight:900">すべて</span>を満たした時点で離脱と判断</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-width:700px;margin:0 auto;margin-bottom:14px">
      <div class="card" style="display:flex;align-items:center;gap:14px">
        <div style="font-size:30px">✅</div>
        <div style="font-size:20px;font-weight:900;color:#5eead4">血中ケトン（β-HB）< 1.0 mmol/L</div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:14px">
        <div style="font-size:30px">✅</div>
        <div style="font-size:20px;font-weight:900;color:#5eead4">pH ≥ 7.30</div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:14px">
        <div style="font-size:30px">✅</div>
        <div style="font-size:20px;font-weight:900;color:#5eead4">HCO₃⁻ ≥ 15 mEq/L</div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:14px">
        <div style="font-size:30px">✅</div>
        <div style="font-size:20px;font-weight:900;color:#5eead4">経口摂取可能</div>
      </div>
    </div>
    <div class="point-box">
      <div class="point-box-title">💡 離脱後の注意</div>
      皮下注インスリンへ切り替え → 持続静注停止の<span style="color:#fbbf24;font-weight:700">1-2時間前</span>に皮下注を開始（インスリン空白を作らない）
    </div>
    <div class="slide-footer"><span>© Dr. いわたつ</span><span>DM Compass シリーズ vol.2</span></div>
  </div>
