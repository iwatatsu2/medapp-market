<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="slide-template.css">
<style>
  .cta { text-align:center; }
  .cta-title { font-size:32px; font-weight:900; color:white; margin-bottom:10px; }
  .cta-app { display:inline-block; background:linear-gradient(135deg,#14b8a6,#0d9488); color:white; font-size:24px; font-weight:900; padding:12px 36px; border-radius:14px; margin:10px 0; }
  .cta-url { font-size:18px; color:#5eead4; margin-top:6px; }
  .qr-area { display:flex; justify-content:center; gap:40px; margin-top:18px; }
  .qr-card { text-align:center; }
  .qr-card img { width:140px; height:140px; border-radius:10px; }
  .qr-label { font-size:15px; font-weight:700; color:#2dd4bf; margin-top:6px; }
  .qr-sublabel { font-size:12px; color:#94a3b8; margin-top:2px; }
</style></head><body>
<div class="slide slide-dark cta">
  <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
  <div class="content">
    <div style="margin-top:16px">
      <div style="font-size:16px;color:#94a3b8;margin-bottom:6px">この内容をいつでもポケットに</div>
      <div class="cta-title">病棟で困ったら <span class="accent">DM Compass</span> を開こう</div>
      <div class="cta-app">📱 DM Compass</div>
      <div class="cta-url">🔗 無料・登録不要・スマホ対応</div>
      <div class="qr-area">
        <div class="qr-card">
          <img src="../qr/qr-site.png" alt="公式サイト">
          <div class="qr-label">🌐 公式サイト</div>
          <div class="qr-sublabel">driwatatsu.readdy.co</div>
        </div>
        <div class="qr-card">
          <img src="../qr/qr-instagram.png" alt="Instagram">
          <div class="qr-label">📱 Instagram</div>
          <div class="qr-sublabel">@dr.iwatatsu</div>
        </div>
        <div class="qr-card">
          <img src="../qr/qr-medapp.png" alt="MedApp Market">
          <div class="qr-label">🏥 医療アプリ</div>
          <div class="qr-sublabel">medapp-market.vercel.app</div>
        </div>
      </div>
      <div style="margin-top:14px;font-size:15px;color:#64748b">制作: <span style="color:#14b8a6;font-weight:900">Dr. いわたつ</span>（糖尿病専門医・指導医 / 内分泌専門医 / 医学博士）</div>
    </div>
  </div>
</div>
</body></html>
