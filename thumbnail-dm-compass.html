<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Compass サムネイル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .container {
    width: 1280px;
    height: 720px;
    background: linear-gradient(135deg, #0a1a1a 0%, #132e2e 50%, #0a1a1a 100%);
    display: flex;
    position: relative;
    overflow: hidden;
  }

  .left {
    width: 780px;
    padding: 30px 50px 50px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 28px;
    z-index: 2;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    width: fit-content;
    margin-bottom: 14px;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .title {
    font-size: 72px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .title .dm {
    background: linear-gradient(135deg, #14b8a6, #2dd4bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .free-badge {
    display: inline-block;
    background: #22c55e;
    color: white;
    font-size: 32px;
    font-weight: 900;
    padding: 10px 28px;
    border-radius: 10px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 26px;
    color: #99f6e4;
    margin-top: 10px;
    font-weight: 700;
    line-height: 1.5;
  }

  /* メニュー全セクション 2列 */
  .sections {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
  }

  .section-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e2e8f0;
    font-size: 16px;
    font-weight: 500;
    padding: 3px 0;
  }

  .section-num {
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .author {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .author-name {
    color: #14b8a6;
    font-size: 22px;
    font-weight: 900;
  }

  .author-role {
    color: #94a3b8;
    font-size: 14px;
    margin-top: 2px;
  }

  /* 右側：イラスト */
  .right {
    position: absolute;
    right: -40px;
    bottom: 0;
    width: 520px;
    height: 720px;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .right img {
    height: 660px;
    object-fit: contain;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.5));
  }

  /* 背景装飾 */
  .bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(140px);
    z-index: 1;
  }

  .bg-glow-1 {
    background: #14b8a6;
    width: 500px; height: 500px;
    top: -150px; right: 150px;
    opacity: 0.12;
  }

  .bg-glow-2 {
    background: #0d9488;
    width: 500px; height: 500px;
    bottom: -200px; left: 100px;
    opacity: 0.12;
  }

  .bg-glow-3 {
    background: #14b8a6;
    width: 400px; height: 400px;
    bottom: 0; right: 100px;
    opacity: 0.08;
  }
</style>
</head>
<body>
<div class="container">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="left">
    <div class="badge">糖尿病病棟管理 研修医向け</div>
    <div class="title-row">
      <h1 class="title"><span class="dm">DM</span> Compass</h1>
      <span class="free-badge">無料</span>
    </div>
    <p class="subtitle">病棟業務でもう迷わない<br>糖尿病マネジメント支援ツール</p>

    <div class="sections">
      <div class="section-item"><div class="section-num">1</div>高血糖緊急症</div>
      <div class="section-item"><div class="section-num">8</div>インスリン完全ガイド</div>
      <div class="section-item"><div class="section-num">2</div>ケトメーター判定</div>
      <div class="section-item"><div class="section-num">9</div>スライディングスケール</div>
      <div class="section-item"><div class="section-num">3</div>糖分入り点滴・IVH</div>
      <div class="section-item"><div class="section-num">10</div>周術期血糖管理</div>
      <div class="section-item"><div class="section-num">4</div>糖尿病タイプ診断</div>
      <div class="section-item"><div class="section-num">11</div>食事・カロリー計算</div>
      <div class="section-item"><div class="section-num">5</div>2型治療アルゴリズム</div>
      <div class="section-item"><div class="section-num">12</div>低血糖対応</div>
      <div class="section-item"><div class="section-num">6</div>HbA1c目標値</div>
      <div class="section-item"><div class="section-num">13</div>合併症リファレンス</div>
      <div class="section-item"><div class="section-num">7</div>内服／注射一覧</div>
      <div class="section-item"><div class="section-num">14</div>制作者</div>
    </div>

    <div class="author">
      <div>
        <div class="author-name">Dr. いわたつ</div>
        <div class="author-role">糖尿病・内分泌専門医</div>
      </div>
    </div>
  </div>

  <div class="right">
    <img src="dr-iwatatsu.png" alt="Dr. いわたつ">
  </div>
</div>
</body>
</html>
